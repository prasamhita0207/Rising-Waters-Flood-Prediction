<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rising Waters - Flood Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- Live background layers -->
    <canvas id="rainCanvas"></canvas>
    <div class="lightning-overlay"></div>
    <div class="ripple-container" id="rippleContainer"></div>

    <div class="container">

        <h1>🌊 Rising Waters</h1>
        <h2>AI Flood Prediction System</h2>

        <form id="predictionForm" autocomplete="off">

            <div class="grid">
                <input type="number" name="MonsoonIntensity" placeholder="Monsoon Intensity" required>
                <input type="number" name="TopographyDrainage" placeholder="Topography Drainage" required>
                <input type="number" name="RiverManagement" placeholder="River Management" required>
                <input type="number" name="Deforestation" placeholder="Deforestation" required>
                <input type="number" name="Urbanization" placeholder="Urbanization" required>
                <input type="number" name="ClimateChange" placeholder="Climate Change" required>
                <input type="number" name="DamsQuality" placeholder="Dams Quality" required>
                <input type="number" name="Siltation" placeholder="Siltation" required>
                <input type="number" name="AgriculturalPractices" placeholder="Agricultural Practices" required>
                <input type="number" name="Encroachments" placeholder="Encroachments" required>
                <input type="number" name="IneffectiveDisasterPreparedness" placeholder="Disaster Preparedness" required>
                <input type="number" name="DrainageSystems" placeholder="Drainage Systems" required>
                <input type="number" name="CoastalVulnerability" placeholder="Coastal Vulnerability" required>
                <input type="number" name="Landslides" placeholder="Landslides" required>
                <input type="number" name="Watersheds" placeholder="Watersheds" required>
                <input type="number" name="DeterioratingInfrastructure" placeholder="Infrastructure" required>
                <input type="number" name="PopulationScore" placeholder="Population Score" required>
                <input type="number" name="WetlandLoss" placeholder="Wetland Loss" required>
                <input type="number" name="InadequatePlanning" placeholder="Inadequate Planning" required>
                <input type="number" name="PoliticalFactors" placeholder="Political Factors" required>
            </div>

            <div class="button-group">
                <button type="submit" id="predictBtn">Predict Flood Risk</button>
                <button type="button" id="resetBtn">Reset</button>
            </div>

        </form>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Predicting Flood Risk...</p>
        </div>

        <div class="result" id="result" style="display:none;">
            <h2>📊 Prediction Result</h2>
            <div id="predictionValue"></div>
            <p class="success-text">✔ Prediction completed successfully</p>
            <div id="adviceBox" class="advice-box">
                <h3>🛡 Flood Safety Recommendations</h3>
                <ul id="adviceList"></ul>
            </div>
        </div>

        <div class="history-box" id="historyBox" style="display:none;">


    </div>


    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

    <script>
        /* ── Rain Canvas ── */
        const canvas = document.getElementById('rainCanvas');
        const ctx    = canvas.getContext('2d');
        let drops    = [];

        function resize() {
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            initDrops();
        }
        window.addEventListener('resize', resize);

        function initDrops() {
            drops = [];
            const count = Math.floor(canvas.width * 0.35);
            for (let i = 0; i < count; i++) {
                drops.push({
                    x:       Math.random() * canvas.width,
                    y:       Math.random() * canvas.height,
                    length:  Math.random() * 22 + 8,
                    speed:   Math.random() * 10 + 8,
                    opacity: Math.random() * 0.5 + 0.2,
                    width:   Math.random() * 1.2 + 0.4,
                    wind:    Math.random() * 2 + 1
                });
            }
        }
        resize();

        function drawRain() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drops.forEach(d => {
                ctx.beginPath();
                ctx.moveTo(d.x, d.y);
                ctx.lineTo(d.x + d.wind, d.y + d.length);
                ctx.strokeStyle = `rgba(80, 170, 230, ${d.opacity})`;
                ctx.lineWidth   = d.width;
                ctx.stroke();
                d.y += d.speed;
                d.x += d.wind * 0.5;
                if (d.y > canvas.height) {
                    d.y = -d.length;
                    d.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(drawRain);
        }
        drawRain();

        /* ── Lightning: bolt on canvas + screen flash every 5s ── */
        const overlay = document.querySelector('.lightning-overlay');

        function drawBolt(startX, startY, endX, endY, generations) {
            if (generations === 0) return;
            const midX = (startX + endX) / 2 + (Math.random() - 0.5) * 120;
            const midY = (startY + endY) / 2 + (Math.random() - 0.5) * 40;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(midX, midY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = 'rgba(255, 255, 180, 0.95)';
            ctx.lineWidth   = generations * 1.5;
            ctx.shadowColor = '#fff';
            ctx.shadowBlur  = 18;
            ctx.stroke();
            ctx.shadowBlur = 0;

            /* random branch */
            if (generations > 1 && Math.random() > 0.4) {
                const branchEndX = midX + (Math.random() - 0.5) * 180;
                const branchEndY = midY + Math.random() * 120 + 60;
                drawBolt(midX, midY, branchEndX, branchEndY, generations - 1);
            }

            drawBolt(startX, startY, midX, midY, generations - 1);
            drawBolt(midX, midY, endX, endY, generations - 1);
        }

        function triggerLightning() {
            const startX = Math.random() * canvas.width;

            /* 1) screen flash */
            overlay.style.background = 'rgba(220, 245, 255, 0.55)';
            setTimeout(() => { overlay.style.background = 'rgba(220, 245, 255, 0)'; }, 80);
            setTimeout(() => { overlay.style.background = 'rgba(220, 245, 255, 0.3)'; }, 140);
            setTimeout(() => { overlay.style.background = 'rgba(220, 245, 255, 0)'; }, 220);

            /* 2) draw bolt on canvas, then fade */
            drawBolt(startX, 0, startX + (Math.random() - 0.5) * 200, canvas.height * 0.7, 4);
            setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 200);
        }

        /* Fire every 5 seconds, with a small random jitter so it feels natural */
        function scheduleLightning() {
            triggerLightning();
            setTimeout(scheduleLightning, 5000 + Math.random() * 500);
        }
        setTimeout(scheduleLightning, 1000); /* first strike after 1s */

        /* ── Flood Ripples ── */
        const rippleCont = document.getElementById('rippleContainer');

        function spawnRipple() {
            const el   = document.createElement('div');
            el.className = 'ripple';
            const size = Math.random() * 80 + 30;
            const x    = Math.random() * 100;
            const y    = Math.random() * 80 + 10;
            el.style.cssText = `
                width:${size}px; height:${size}px;
                left:calc(${x}% - ${size/2}px);
                bottom:${y}px;
                animation-duration:${Math.random()*2+2}s;
                animation-delay:${Math.random()}s;
            `;
            rippleCont.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }
        setInterval(spawnRipple, 300);
    </script>

</body>
</html>
